        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar -->
<header class="bg-[#f7f9fb] dark:bg-slate-900 font-['Newsreader'] text-lg antialiased flex justify-between items-center w-full px-8 py-6 max-w-none docked full-width top-0 bg-gradient-to-b from-[#f2f4f6] to-transparent sticky z-50">
<div class="font-['Newsreader'] italic font-bold text-[#00425e] dark:text-sky-400 text-2xl">
            Editorial Assurance
        </div>
<div class="flex items-center gap-6">
<button class="text-[#40484e] dark:text-slate-400 hover:bg-[#f2f4f6] dark:hover:bg-slate-800 transition-colors duration-300 p-2 rounded-full flex items-center gap-2">

<button class="text-[#40484e] dark:text-slate-400 hover:bg-[#f2f4f6] dark:hover:bg-slate-800 transition-colors duration-300 px-4 py-2 font-medium">

            </button>
</div>
</header>

<!-- Progress Indicator -->
<div class="w-full max-w-xl mb-16">
<div class="flex justify-between items-end mb-4">
<span class="font-headline italic text-primary text-2xl">15% complete</span>
<span class="font-label text-on-surface-variant text-sm tracking-widest uppercase">Question 1 of 8</span>
</div>
<div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-tertiary-fixed-dim w-[15%] rounded-full"></div>
</div>
</div>
<!-- Hero Content -->
<div class="w-full text-center md:text-left mb-12">
<h1 class="font-headline text-5xl md:text-7xl text-primary leading-tight mb-6 md:ml-[-2rem]">
                Tell us about <br class="hidden md:block"/> your <span class="serif-italic">home.</span>
</h1>
<p class="font-body text-xl text-on-surface-variant max-w-lg mb-8 leading-relaxed">
                Excellent choice. This helps us tailor your quotes.
            </p>
</div>
<!-- Input Section: High-Contrast Radio Cards -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl">
<!-- House Card (Selected State for visual demo) -->
<button class="group relative flex flex-col items-start p-10 bg-primary text-on-primary rounded-xl shadow-2xl transition-all duration-300 scale-100 hover:scale-105 text-left ring-offset-4 ring-primary ring-2">
<div class="mb-8 p-4 bg-primary-container rounded-lg text-on-primary-container">
<span class="material-symbols-outlined text-4xl" data-icon="house">house</span>
</div>
<h3 class="font-headline text-3xl mb-2">House</h3>
<p class="font-body text-sm text-primary-fixed-dim opacity-90">A detached single-family residence.</p>
<div class="absolute top-6 right-6">
<span class="material-symbols-outlined text-tertiary-fixed-dim" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Apartment Card -->
<button class="group relative flex flex-col items-start p-10 bg-surface-container-lowest text-on-surface rounded-xl transition-all duration-300 hover:bg-surface-container hover:shadow-lg text-left">
<div class="mb-8 p-4 bg-surface-container-low rounded-lg text-primary">
<span class="material-symbols-outlined text-4xl" data-icon="apartment">apartment</span>
</div>
<h3 class="font-headline text-3xl mb-2">Apartment</h3>
<p class="font-body text-sm text-on-surface-variant">A unit within a multi-family building.</p>
</button>
<!-- Condo Card -->
<button class="group relative flex flex-col items-start p-10 bg-surface-container-lowest text-on-surface rounded-xl transition-all duration-300 hover:bg-surface-container hover:shadow-lg text-left">
<div class="mb-8 p-4 bg-surface-container-low rounded-lg text-primary">
<span class="material-symbols-outlined text-4xl" data-icon="domain">domain</span>
</div>
<h3 class="font-headline text-3xl mb-2">Condo</h3>
<p class="font-body text-sm text-on-surface-variant">An individually owned unit in a community.</p>
</button>
</div>

<img class="w-full h-full object-cover" data-alt="minimalist architectural photo of a modern sunlit home exterior with clean lines and soft natural shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCIoqEfGirX4Y_QXW0p-Ocbki0gk1Q3IweUO8qDf07h0fZo0zMFQ8ywFXTapQCyqq98VzxIRP0toJ7yi0u7Efwzbjxv5r3gdHjE6FLA4dazQ7lVXDK0olqz7pktsUfm68k6cSHJ40Al_JUlyiA0Y1MBVmb8qYqZNJR6cvAbC29f7Y_ngj4pm9mdkBMVppkfwl53gS0On9-xPpXMTlJ3nOEs7sUuAEcvWE6Z2Z2WtEJFvz912PkpazPUNRV-7XdVmb2PwmAulme3I6o"/>

<nav class="fixed inset-x-0 bottom-12 fixed bottom-12 left-0 w-full z-50 flex justify-between px-12 items-center max-w-7xl mx-auto font-['Manrope'] font-medium text-sm tracking-wide uppercase">
<button class="bg-[#81f3e5] text-[#006f66] rounded-xl px-8 py-5 hover:scale-105 transition-transform duration-300 active:scale-95 duration-200 flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
            Previous
        </button>
<div class="hidden md:flex flex-col items-center">
<span class="text-primary-container font-bold opacity-40">Progress</span>
<span class="text-primary lowercase tracking-normal font-headline text-lg">Step 1 of 5</span>
</div>
<button class="bg-[#00425e] text-white rounded-xl px-12 py-5 shadow-lg hover:scale-105 transition-transform duration-300 active:scale-95 duration-200 flex items-center gap-3">
            Next
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>

<!-- Footer (Universal Progress Bar Background) -->
<footer class="fixed bottom-0 left-0 w-full h-2 bg-[#f2f4f6] dark:bg-slate-800 fixed bottom-0 w-full">
<div class="absolute bottom-6 left-12 font-['Manrope'] text-[#40484e] text-sm italic">
            Your progress is automatically saved.
        </div>
<div class="absolute bottom-6 right-12 flex gap-8 font-['Manrope'] text-[#40484e] text-sm italic">

<a class="hover:text-[#00425e] transition-colors" href="#">Terms of Service</a>
