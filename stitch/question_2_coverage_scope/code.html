<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#c6e7ff",
                    "secondary-fixed": "#84f5e8",
                    "surface-variant": "#e0e3e5",
                    "secondary-fixed-dim": "#66d9cc",
                    "tertiary-container": "#784b00",
                    "surface-container": "#eceef0",
                    "surface-container-highest": "#e0e3e5",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "inverse-surface": "#2d3133",
                    "error": "#ba1a1a",
                    "on-primary-fixed": "#001e2d",
                    "on-secondary": "#ffffff",
                    "on-primary-container": "#91d1fb",
                    "surface-tint": "#176589",
                    "primary": "#00425e",
                    "tertiary": "#593600",
                    "on-surface": "#191c1e",
                    "inverse-on-surface": "#eff1f3",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#ffddb8",
                    "outline-variant": "#c0c7ce",
                    "tertiary-fixed-dim": "#ffb95f",
                    "surface": "#f7f9fb",
                    "on-background": "#191c1e",
                    "on-primary-fixed-variant": "#004c6b",
                    "surface-bright": "#f7f9fb",
                    "surface-dim": "#d8dadc",
                    "on-tertiary-container": "#ffbd6b",
                    "on-tertiary-fixed-variant": "#653e00",
                    "on-secondary-fixed-variant": "#005049",
                    "on-secondary-fixed": "#00201d",
                    "inverse-primary": "#8ecef7",
                    "on-secondary-container": "#006f66",
                    "secondary": "#006a62",
                    "primary-fixed-dim": "#8ecef7",
                    "on-error": "#ffffff",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f2f4f6",
                    "on-surface-variant": "#40484e",
                    "primary-container": "#005b7f",
                    "outline": "#70787e",
                    "surface-container-high": "#e6e8ea",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#81f3e5",
                    "background": "#f7f9fb",
                    "on-tertiary-fixed": "#2a1700"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Newsreader"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .serif-text { font-family: 'Newsreader', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#f7f9fb] dark:bg-slate-900 flex justify-between items-center w-full px-8 py-6 max-w-none fixed top-0 z-40 bg-gradient-to-b from-[#f2f4f6] to-transparent">
<div class="flex items-center gap-4">
<span class="font-['Newsreader'] italic font-bold text-[#00425e] dark:text-sky-400 text-2xl">Editorial Assurance</span>
</div>
<div class="flex items-center gap-6">
<button class="text-[#40484e] dark:text-slate-400 hover:bg-[#f2f4f6] dark:hover:bg-slate-800 transition-colors duration-300 p-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
<button class="text-[#40484e] dark:text-slate-400 font-['Newsreader'] text-lg antialiased hover:bg-[#f2f4f6] dark:hover:bg-slate-800 transition-colors duration-300 px-4 py-1 rounded-lg">
                Exit
            </button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-48">
<div class="max-w-4xl w-full">
<!-- Encouraging Message (Editorial Style) -->
<div class="mb-12 flex flex-col md:flex-row md:items-end gap-6 md:gap-12">
<div class="flex-1">
<h1 class="serif-text text-5xl md:text-7xl font-medium tracking-tight text-primary leading-tight mb-6">
                        Who would you like to cover?
                    </h1>
<p class="text-on-surface-variant font-body text-xl max-w-md italic">
                        "Family is what matters most. We'll find the best options for everyone."
                    </p>
</div>
<!-- Progress Indicator -->
<div class="w-full md:w-48 mb-4">
<div class="flex justify-between items-center mb-2">
<span class="text-xs font-bold tracking-widest uppercase text-outline">Progress</span>
<span class="text-xs font-extrabold text-primary">30%</span>
</div>
<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-tertiary-fixed-dim w-[30%]"></div>
</div>
</div>
</div>
<!-- Segmented Control / Large Toggle Group -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<!-- Option 1: Just myself -->
<button class="group relative flex flex-col p-8 bg-surface-container-lowest rounded-xl text-left transition-all duration-300 hover:ring-2 hover:ring-primary-container focus:outline-none focus:ring-4 focus:ring-primary-fixed">
<div class="mb-6 h-12 w-12 bg-surface-container rounded-full flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="person">person</span>
</div>
<span class="font-headline text-2xl text-primary font-semibold mb-2">Just myself</span>
<span class="text-sm text-on-surface-variant leading-relaxed">Personalized coverage tailored specifically to your individual needs.</span>
</button>
<!-- Option 2: Myself and a partner (Active State Simulation) -->
<button class="group relative flex flex-col p-8 bg-primary text-white rounded-xl text-left shadow-2xl shadow-primary/20 scale-105 z-10 focus:outline-none ring-4 ring-primary-fixed">
<div class="mb-6 h-12 w-12 bg-on-primary/10 rounded-full flex items-center justify-center text-secondary-fixed">
<span class="material-symbols-outlined text-3xl" data-icon="group" data-weight="fill" style="font-variation-settings: 'FILL' 1;">group</span>
</div>
<span class="font-headline text-2xl font-semibold mb-2">Myself and a partner</span>
<span class="text-sm text-primary-fixed leading-relaxed opacity-90">Dual protection for you and your significant other under one roof.</span>
<div class="absolute top-4 right-4">
<span class="material-symbols-outlined text-secondary-fixed" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 3: My whole family -->
<button class="group relative flex flex-col p-8 bg-surface-container-lowest rounded-xl text-left transition-all duration-300 hover:ring-2 hover:ring-primary-container focus:outline-none focus:ring-4 focus:ring-primary-fixed">
<div class="mb-6 h-12 w-12 bg-surface-container rounded-full flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="family_history">family_history</span>
</div>
<span class="font-headline text-2xl text-primary font-semibold mb-2">My whole family</span>
<span class="text-sm text-on-surface-variant leading-relaxed">Comprehensive care for children, parents, and everyone in between.</span>
</button>
</div>
<!-- Background Aesthetic Image (Bento style) -->
<div class="mt-16 rounded-3xl overflow-hidden h-64 w-full relative">
<img alt="Warm living room scene" class="w-full h-full object-cover opacity-60 grayscale hover:grayscale-0 transition-all duration-700" data-alt="Soft focused interior of a warm minimalist living room with sunlight streaming through linen curtains, peaceful and safe atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDusvmTssIgL3TM2n2y0OgmLwdX0xlq_HlZYLvX9Yw-_tjwAXR0CnGMbr0iCygRl6HN4LzmZ7-gzcGa1ogRueGC5jqY8CGwj67uv-sIvdnpnDzH1AwSZ2FMCdWYqoV8liAdJ2rI9nXqyW6PZrYRuInJ9XbOHu1atJ2jjTKWDUPLSUs4Pp0l4ujDqyb6EQLPXPLr2hYgQce2dfGVXVxYFXVQsRksN6E3q8t6Uz_Qie6Bh-7gvmpt_jxQyIgFIEa4WwSFCU8IWADpA5o"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
</div>
</div>
</main>
<!-- SideNavBar (Navigation Anchors) -->
<nav class="fixed bottom-12 left-0 w-full z-50 flex justify-between px-12 items-center max-w-7xl mx-auto pointer-events-none">
<div class="flex-1 flex justify-start pointer-events-auto">
<button class="bg-[#81f3e5] text-[#006f66] rounded-xl px-8 py-5 font-['Manrope'] font-medium text-sm tracking-wide uppercase hover:scale-105 transition-transform duration-300 flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
                Previous
            </button>
</div>
<!-- Semantic Shell Header in Nav Area -->
<div class="hidden md:flex flex-col items-center flex-1">
<span class="font-['Manrope'] font-medium text-xs tracking-[0.2em] uppercase text-outline">Progress</span>
<span class="font-headline text-primary font-bold text-lg">Step 1 of 5</span>
</div>
<div class="flex-1 flex justify-end pointer-events-auto">
<button class="bg-[#00425e] text-white rounded-xl px-12 py-5 shadow-lg font-['Manrope'] font-medium text-sm tracking-wide uppercase hover:scale-105 transition-transform duration-300 flex items-center gap-3">
                Next
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</nav>
<!-- Footer -->
<footer class="fixed bottom-0 left-0 w-full h-12 flex items-center px-12 bg-surface-container-low dark:bg-slate-800">
<div class="flex justify-between w-full items-center">
<p class="font-['Manrope'] text-[#40484e] text-sm italic">
                Your progress is automatically saved.
            </p>
<div class="flex gap-6">
<a class="text-sm font-['Manrope'] text-[#40484e] hover:text-[#00425e] transition-colors" href="#">Privacy Policy</a>
<a class="text-sm font-['Manrope'] text-[#40484e] hover:text-[#00425e] transition-colors" href="#">Terms of Service</a>
</div>
</div>
<div class="fixed bottom-0 left-0 w-full h-2 bg-[#f2f4f6] dark:bg-slate-800"></div>
</footer>
</body></html>
